name: Build FrameX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.5.3
        shell: pwsh
        run: |
          pip install aqtinstall==3.1.7
          aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --modules qtmultimedia qtsql --outputdir C:\Qt
          Add-Content $env:GITHUB_PATH "C:\Qt\6.5.3\msvc2019_64\bin"
          Add-Content $env:GITHUB_ENV "Qt6_DIR=C:\Qt\6.5.3\msvc2019_64"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/GyanD/codexffmpeg/releases/download/6.1.1/ffmpeg-6.1.1-full_build-shared.7z" -OutFile "$env:RUNNER_TEMP\ffmpeg.7z"
          7z x "$env:RUNNER_TEMP\ffmpeg.7z" -o"C:\ffmpeg_x" -y | Out-Null
          $d = Get-ChildItem "C:\ffmpeg_x" -Directory | Select-Object -First 1
          Move-Item $d.FullName "C:\ffmpeg"

      - name: Configure
        shell: cmd
        run: cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:\Qt\6.5.3\msvc2019_64" -DFFMPEG_DIR="C:\ffmpeg"

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel 4

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir deploy
          copy build\FrameX.exe deploy\
          windeployqt --release --no-translations --multimedia --dir deploy deploy\FrameX.exe

      - name: Copy FFmpeg DLLs
        shell: pwsh
        run: |
          foreach ($dll in @("avcodec","avformat","avutil","swscale","swresample","avdevice","avfilter")) {
            Get-ChildItem "C:\ffmpeg\bin\$dll*.dll" -EA SilentlyContinue | Copy-Item -Destination deploy
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create Installer
        shell: cmd
        run: |
          mkdir installer\output
          iscc installer\setup.iss

      - name: Upload Installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Setup-Windows
          path: installer/output/*.exe
          retention-days: 30

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Portable
          path: deploy/
          retention-days: 30
