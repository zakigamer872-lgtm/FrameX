name: Build FrameX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 + Qt6 + FFmpeg
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-sql
            mingw-w64-x86_64-ffmpeg

      - name: Configure CMake
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DFFMPEG_DIR=/mingw64

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Deploy DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deploy
          Copy-Item build/FrameX.exe deploy/
          $qt = "C:\msys64\mingw64\bin"
          foreach ($dll in @("Qt6Core","Qt6Gui","Qt6Widgets","Qt6Multimedia","Qt6MultimediaWidgets","Qt6Network","Qt6Sql","Qt6OpenGL","Qt6OpenGLWidgets")) {
            Get-ChildItem "$qt\$dll*.dll" -EA SilentlyContinue | Copy-Item -Destination deploy
          }
          $plugins = "C:\msys64\mingw64\share\qt6\plugins"
          foreach ($dir in @("platforms","imageformats","styles","multimedia")) {
            New-Item -ItemType Directory -Force -Path "deploy\$dir" | Out-Null
            Get-ChildItem "$plugins\$dir\*.dll" -EA SilentlyContinue | Copy-Item -Destination "deploy\$dir"
          }
          foreach ($dll in @("avcodec","avformat","avutil","swscale","swresample","avdevice","avfilter","libgcc_s_seh-1","libstdc++-6","libwinpthread-1")) {
            Get-ChildItem "$qt\$dll*.dll" -EA SilentlyContinue | Copy-Item -Destination deploy
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create Installer
        shell: cmd
        run: |
          mkdir installer\output
          iscc installer\setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Setup-Windows
          path: installer/output/*.exe
          retention-days: 30

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Portable
          path: deploy/
          retention-days: 30
