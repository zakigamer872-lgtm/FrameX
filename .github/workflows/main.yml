name: Build FrameX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtsql'
          cache: 'true'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/6.1.1/ffmpeg-6.1.1-full_build-shared.7z"
          Invoke-WebRequest $url -OutFile "$env:RUNNER_TEMP\ffmpeg.7z"
          7z x "$env:RUNNER_TEMP\ffmpeg.7z" -o"C:\ffmpeg_x" -y | Out-Null
          $d = Get-ChildItem "C:\ffmpeg_x" -Directory | Select-Object -First 1
          Move-Item $d.FullName "C:\ffmpeg"

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%Qt6_DIR%" -DFFMPEG_DIR="C:\ffmpeg"

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel 4

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir deploy
          copy build\FrameX.exe deploy\
          windeployqt --release --no-translations --multimedia --dir deploy deploy\FrameX.exe

      - name: Copy FFmpeg DLLs
        shell: pwsh
        run: |
          foreach ($dll in @("avcodec","avformat","avutil","swscale","swresample","avdevice","avfilter")) {
            Get-ChildItem "C:\ffmpeg\bin\$dll*.dll" -EA SilentlyContinue | Copy-Item -Dest deploy
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create Installer
        shell: cmd
        run: |
          mkdir installer\output
          iscc installer\setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Setup-Windows
          path: installer/output/*.exe
          retention-days: 30

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-Portable
          path: deploy/
          retention-days: 30
